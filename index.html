<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrera de Caballos - Baraja Española</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Carrera de Caballos</h1>

<div class="contenedor-juego">

    <!-- COLUMNA IZQUIERDA: La Carrera -->
    <div class="columna-izquierda">
        <div class="tablero">
            <div class="caballos-container" id="carriles">
            </div>
        </div>

        <h3>Cartas de la Pista (Retrocesos)</h3>
        <div class="pista-container" id="pista-ui">
        </div>
    </div>

    <!-- COLUMNA DERECHA: Controles y Baraja -->
    <div class="columna-derecha">
        <div class="mesa-central">
            <div class="carta-grande carta-dorso" id="mazo-visual">MAZO</div>
            <div style="font-size: 2em;">⬇️</div>
            <div class="carta-grande carta-vacia" id="carta-activa">TU CARTA</div>
        </div>

        <div class="controles" style="display: flex; flex-direction: column; gap: 10px; width: 100%;">
            <button id="btn-sacar" onclick="jugarTurno()">Sacar Carta</button>
            <button id="btn-auto" onclick="toggleAutoPlay()" style="background-color: #3498db; color: white;">▶ Simulación Automática</button>
            <button onclick="reiniciarJuego()" style="background-color: #e74c3c; color: white;">Reiniciar</button>
        </div>

        <div id="log"></div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
